baseURL: https://r15-papercss-hugo.r15cookie.com
languageCode: en-us
defaultContentLanguage: en
title: PaperCSS
theme: r15-papercss-hugo-theme
googleAnalytics: UA-123456789-1
disqusShortname: yourdiscussshortname

privacy:
  disqus:
    disable: true

taxonomies:
  tag: tags

permalinks:
  post: /:filename/

imaging:
  quality: 99

# To disable, set to an extremely large value, such as 999999
paginate: 5

params:
  homeMetaContent: A Hugo theme made with PaperCSS, the less formal CSS framework.
  # For more date formats see https://gohugo.io/functions/format/
  dateFormat: Jan 2, 2006
  navTitleLink: /
  enable_search: true  # Enable search functionality
  github_repo: "owner/repo"  # Used for commit links when the homepage shows git commits (see data/commits.json)

menu:
  nav:
    - name: Blog
      url: /
      weight: 1
    - name: Tags
      url: /tags/
      weight: 2
    - name: Recipe
      url: /recipe/
      weight: 3
    - name: Coffee
      url: /coffee/
      weight: 4
    - name: About
      url: /about/
      weight: 5
    - name: RSS
      url: /index.xml
      weight: 6

outputs:
  home:
    - HTML
    - SearchIndex

outputFormats:
  SearchIndex:
    mediaType: application/json
    baseName: search
    isPlainText: true
    notAlternative: true
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      strikethrough: true
      table: true
      taskList: true
      typographer: true
    parser:
      attribute: true
      autoHeadingID: true
    renderer:
      hardWraps: false
      unsafe: true
      xHTML: false
  highlight:
    codeFences: true
    hl_Lines: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true
    noClasses: true
    style: monokai
    tabWidth: 4
  tableOfContents:
    endLevel: 6
    startLevel: 2
